<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlEnshaiah - DC Form</title>
<script src="https://alcdn.msauth.net/browser/2.32.2/js/msal-browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#4C5D71;--primary-dark:#3A4A5E;--primary-light:#E8ECF0;--green:#107C10;--green-light:#E6F7E6;--red:#D92C2C;--red-light:#FDE8E8;--orange:#ED7D31;--orange-light:#FFF0E0;--yellow:#FFB900;--blue:#0078D4;--gray:#8A8886;--gray-light:#F3F2F1;--gray-border:#EDEBE9;--text-primary:#201E1F;--text-secondary:#605E5C;--white:#FFFFFF;--bg:#F3F2F1;--shadow:0 1px 3px rgba(0,0,0,.08);--radius:6px;--header-h:52px}
body.dark{--primary:#7A8FA5;--primary-dark:#8DA3B9;--primary-light:#2A3540;--green:#4CAF50;--green-light:#1B3A1B;--red:#F44336;--red-light:#3D1A1A;--orange:#FF9800;--orange-light:#3D2A0A;--yellow:#FFC107;--gray:#A09E9C;--gray-light:#2D2D2D;--gray-border:#3D3D3D;--text-primary:#E0E0E0;--text-secondary:#B0B0B0;--white:#1E1E1E;--bg:#121212;--shadow:0 1px 3px rgba(0,0,0,.3);--blue:#4FC3F7}
html,body{height:100%;font-family:'Segoe UI',-apple-system,system-ui,sans-serif;font-size:14px;color:var(--text-primary);background:var(--bg)}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.header{height:var(--header-h);background:var(--white);border-bottom:1px solid var(--gray-border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;z-index:100}
.header .logo{width:28px;height:28px;background:var(--primary);border-radius:4px;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:14px;flex-shrink:0}
.header h1{font-size:15px;font-weight:600;flex-shrink:0}
.header .spacer{flex:1}
.dept-select{display:flex;align-items:center;gap:6px}
.dept-select label{font-size:12px;font-weight:600;color:var(--text-secondary);white-space:nowrap}
.dept-select select{padding:5px 10px;border:1px solid var(--gray-border);border-radius:4px;font-size:13px;background:var(--white);color:var(--text-primary);outline:none;cursor:pointer}
.dept-select select:focus{border-color:var(--primary)}
.dept-select select:disabled{opacity:.5;cursor:not-allowed}
.auth-area{display:flex;align-items:center;gap:8px;flex-shrink:0}
.auth-area .user-name{font-size:12px;color:var(--text-secondary);white-space:nowrap}
.auth-btn{padding:5px 14px;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.auth-btn.login{background:var(--primary);color:white}
.auth-btn.login:hover{background:var(--primary-dark)}
.auth-btn.logout{background:var(--red-light);color:var(--red);border:1px solid var(--red)}
.auth-btn.logout:hover{background:var(--red);color:white}
.toolbar{display:flex;align-items:center;gap:10px;padding:12px 20px;background:var(--white);border-bottom:1px solid var(--gray-border);flex-wrap:wrap;flex-shrink:0}
.toolbar .search-box{flex:1;min-width:200px;position:relative}
.toolbar .search-box input{width:100%;padding:7px 12px 7px 32px;border:1px solid var(--gray-border);border-radius:20px;font-size:13px;outline:none;background:var(--bg);color:var(--text-primary)}
.toolbar .search-box input:focus{border-color:var(--primary)}
.toolbar .search-box .icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-secondary);font-size:14px}
.toolbar .btn{padding:7px 16px;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.toolbar .btn-primary{background:var(--primary);color:white}
.toolbar .btn-primary:hover{background:var(--primary-dark)}
.toolbar .btn-success{background:var(--green);color:white}
.toolbar .btn-success:hover{background:#0a5c0a}
.toolbar .btn-outline{background:transparent;border:1px solid var(--gray-border);color:var(--text-primary)}
.toolbar .btn-outline:hover{background:var(--gray-light)}
.toolbar .count-badge{font-size:12px;color:var(--text-secondary);padding:3px 10px;background:var(--gray-light);border-radius:10px;white-space:nowrap}
.toolbar .status-msg{font-size:11px;color:var(--text-secondary);padding:3px 10px;background:var(--yellow-light);border-radius:10px;display:none;white-space:nowrap}
.main{display:flex;flex:1;overflow:hidden}
.results-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.results-panel .table-wrap{flex:1;overflow:auto;padding:0 20px 20px}
.results-panel table{width:100%;border-collapse:collapse;font-size:12px}
.results-panel th{position:sticky;top:0;background:var(--white);padding:8px 10px;text-align:left;font-weight:600;border-bottom:2px solid var(--gray-border);white-space:nowrap;z-index:2;color:var(--text-secondary);font-size:11px;text-transform:uppercase;letter-spacing:.3px}
.results-panel td{padding:7px 10px;border-bottom:1px solid var(--gray-border);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.results-panel tr{cursor:pointer;transition:background .1s}
.results-panel tr:hover td{background:var(--primary-light)}
.results-panel tr.selected td{background:var(--primary-light);border-bottom-color:var(--primary)}
.results-panel .empty-state{text-align:center;padding:60px 20px;color:var(--text-secondary)}
.results-panel .empty-state .icon{font-size:48px;margin-bottom:12px}
.results-panel .empty-state h3{font-size:16px;font-weight:600;margin-bottom:4px;color:var(--text-primary)}
.results-panel .empty-state p{font-size:13px}
.form-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:300;display:flex;justify-content:flex-end}
.form-overlay.hidden{display:none}
.form-panel{width:55vw;max-width:900px;min-width:480px;height:100vh;background:var(--white);box-shadow:-4px 0 24px rgba(0,0,0,.15);display:flex;flex-direction:column;overflow:hidden;animation:slideInRight .25s ease}
@keyframes slideInRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
.form-panel .form-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--gray-border);flex-shrink:0}
.form-panel .form-header h3{font-size:14px;font-weight:600}
.form-panel .form-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-secondary);padding:2px 6px;border-radius:4px}
.form-panel .form-close:hover{background:var(--gray-light)}
.form-panel .form-body{flex:1 1 0;min-height:0;overflow-y:auto;padding:12px 16px 16px}
.form-panel .form-footer{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--gray-border);flex-shrink:0;justify-content:flex-end;align-items:center}
.form-panel .form-footer .btn{padding:7px 20px;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.form-panel .form-footer .btn-primary{background:var(--primary);color:white}
.form-panel .form-footer .btn-primary:hover{background:var(--primary-dark)}
.form-panel .form-footer .btn-primary:disabled{opacity:.5;cursor:not-allowed}
.form-panel .form-footer .btn-danger{background:var(--red);color:white}
.form-panel .form-footer .btn-danger:hover{background:#b71c1c}
.form-panel .form-footer .btn-outline{background:transparent;border:1px solid var(--gray-border);color:var(--text-primary)}
.form-panel .form-footer .btn-outline:hover{background:var(--gray-light)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:3px}
.form-group .required::after{content:' *';color:var(--red)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:7px 10px;border:1px solid var(--gray-border);border-radius:4px;font-size:13px;outline:none;background:var(--white);color:var(--text-primary);font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-light)}
.form-group textarea{resize:vertical;min-height:60px}
.form-group .hint{font-size:11px;color:var(--text-secondary);margin-top:2px}
.form-group input[type=date]{padding:6px 10px}
.form-group .chk-group{display:flex;flex-wrap:wrap;gap:6px}
.form-group .chk-group label{display:flex;align-items:center;gap:4px;font-weight:400;font-size:12px;cursor:pointer;padding:3px 8px;border:1px solid var(--gray-border);border-radius:4px;transition:all .1s}
.form-group .chk-group label:hover{background:var(--gray-light)}
.form-group .chk-group input[type=checkbox]{width:auto;margin:0;cursor:pointer}
.form-group .chk-group label.selected{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}
.attachment-section{border-top:1px solid var(--gray-border);margin-top:8px;padding-top:12px}
.attachment-section>label{display:block;font-size:12px;font-weight:600;margin-bottom:8px;color:var(--text-secondary)}
.attachment-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid var(--gray-border);border-radius:4px;margin-bottom:4px;font-size:12px}
.attachment-item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attachment-item .size{color:var(--text-secondary);flex-shrink:0;font-size:11px}
.attachment-item .btn-icon{background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:3px;font-size:13px;color:var(--text-secondary);flex-shrink:0;transition:all .1s}
.attachment-item .btn-icon:hover{background:var(--gray-light)}
.attachment-item .btn-icon.download{color:var(--blue)}
.attachment-item .btn-icon.download:hover{background:var(--primary-light)}
.attachment-item .btn-icon.delete{color:var(--red)}
.attachment-item .btn-icon.delete:hover{background:var(--red-light)}
.attachment-upload{display:flex;gap:6px;margin-top:8px;align-items:center}
.attachment-upload input[type=file]{flex:1;font-size:12px}
.attachment-upload .btn{padding:6px 14px;font-size:12px}
.attachment-loading{text-align:center;padding:16px;color:var(--text-secondary);font-size:12px}
.attachment-empty{text-align:center;padding:16px;color:var(--text-secondary);font-size:12px}
.save-status{padding:4px 12px;border-radius:4px;font-size:12px;font-weight:600;display:none}
.save-status.saving{display:inline-block;background:var(--yellow-light);color:#8A6D00}
.save-status.saved{display:inline-block;background:var(--green-light);color:var(--green)}
.save-status.error{display:inline-block;background:var(--red-light);color:var(--red)}
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.15);z-index:500;align-items:center;justify-content:center}
.loading-overlay.show{display:flex}
.loading-overlay .spinner{width:40px;height:40px;border:4px solid var(--gray-border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:6px;font-size:13px;font-weight:600;z-index:600;box-shadow:0 4px 16px rgba(0,0,0,.15);display:none;animation:slideUp .3s ease}
.toast.show{display:block}
.toast.success{background:var(--green);color:white}
.toast.error{background:var(--red);color:white}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.bulk-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:400;display:none;align-items:center;justify-content:center}
.bulk-overlay.show{display:flex}
.bulk-modal{background:var(--white);border-radius:8px;width:90vw;max-width:800px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 8px 30px rgba(0,0,0,.25)}
.bulk-modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--gray-border);flex-shrink:0}
.bulk-modal-head h3{font-size:15px;font-weight:600;margin:0}
.bulk-modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-secondary);padding:2px 6px;border-radius:4px}
.bulk-modal-close:hover{background:var(--gray-light)}
.bulk-modal-body{flex:1;overflow:auto;padding:16px 20px}
.bulk-modal-foot{display:flex;gap:8px;padding:12px 20px;border-top:1px solid var(--gray-border);flex-shrink:0;justify-content:flex-end;align-items:center}
.bulk-modal-foot .btn{padding:7px 20px;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.bulk-modal-foot .btn-primary{background:var(--primary);color:white}
.bulk-modal-foot .btn-primary:hover{background:var(--primary-dark)}
.bulk-modal-foot .btn-primary:disabled{opacity:.5;cursor:not-allowed}
.bulk-modal-foot .btn-outline{background:transparent;border:1px solid var(--gray-border);color:var(--text-primary)}
.bulk-modal-foot .btn-outline:hover{background:var(--gray-light)}
.bulk-drop-zone{border:2px dashed var(--gray-border);border-radius:8px;padding:40px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:12px}
.bulk-drop-zone:hover,.bulk-drop-zone.dragover{border-color:var(--primary);background:var(--primary-light)}
.bulk-drop-zone .icon{font-size:40px;margin-bottom:8px}
.bulk-drop-zone p{font-size:13px;color:var(--text-secondary);margin-bottom:4px}
.bulk-preview{overflow-x:auto;margin-top:8px}
.bulk-preview table{width:100%;border-collapse:collapse;font-size:11px}
.bulk-preview th{background:var(--gray-light);padding:6px 8px;text-align:left;font-weight:600;border-bottom:2px solid var(--gray-border);white-space:nowrap;position:sticky;top:0}
.bulk-preview td{padding:5px 8px;border-bottom:1px solid var(--gray-border);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bulk-preview .skip-col{opacity:.4}
.bulk-progress{margin-top:12px;display:none}
.bulk-progress.show{display:block}
.bulk-progress-bar{height:8px;background:var(--gray-border);border-radius:4px;overflow:hidden;margin-bottom:4px}
.bulk-progress-fill{height:100%;background:var(--primary);border-radius:4px;transition:width .3s;width:0}
.export-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:400;display:none;align-items:center;justify-content:center}
.export-overlay.show{display:flex}
.export-modal{background:var(--white);border-radius:8px;width:90vw;max-width:560px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 8px 30px rgba(0,0,0,.25)}
.export-modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--gray-border);flex-shrink:0}
.export-modal-head h3{font-size:15px;font-weight:600;margin:0}
.export-modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-secondary);padding:2px 6px;border-radius:4px}
.export-modal-close:hover{background:var(--gray-light)}
.export-modal-body{flex:1;overflow:auto;padding:16px 20px}
.export-modal-foot{display:flex;gap:8px;padding:12px 20px;border-top:1px solid var(--gray-border);flex-shrink:0;justify-content:flex-end;align-items:center}
.export-modal-foot .btn{padding:7px 20px;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.export-modal-foot .btn-primary{background:var(--primary);color:white}
.export-modal-foot .btn-primary:hover{background:var(--primary-dark)}
.export-modal-foot .btn-primary:disabled{opacity:.5;cursor:not-allowed}
.export-modal-foot .btn-outline{background:transparent;border:1px solid var(--gray-border);color:var(--text-primary)}
.export-modal-foot .btn-outline:hover{background:var(--gray-light)}
.export-section{margin-bottom:14px}
.export-section-title{font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.export-row{display:flex;gap:10px;margin-bottom:6px}
.export-row label{font-size:12px;color:var(--text-primary);display:flex;align-items:center;gap:4px;white-space:nowrap}
.export-row input[type=date],.export-row select{padding:5px 8px;border:1px solid var(--gray-border);border-radius:4px;font-size:12px;outline:none;background:var(--white);color:var(--text-primary);flex:1}
.export-row input[type=date]:focus,.export-row select:focus{border-color:var(--primary)}
.export-status-group{display:flex;flex-wrap:wrap;gap:4px 12px;margin-top:4px}
.export-status-group label{font-size:12px;color:var(--text-primary);display:flex;align-items:center;gap:3px;cursor:pointer}
.export-format-group{display:flex;gap:16px;margin-top:4px}
.export-format-group label{font-size:13px;color:var(--text-primary);display:flex;align-items:center;gap:4px;cursor:pointer;padding:6px 12px;border:1px solid var(--gray-border);border-radius:4px;transition:all .1s}
.export-format-group label:hover{border-color:var(--primary);background:var(--primary-light)}
.export-format-group input:checked+span{font-weight:600}
.export-format-group input{accent-color:var(--primary)}
.bulk-progress-text{font-size:11px;color:var(--text-secondary);text-align:center}
.dark-toggle{background:none;border:none;font-size:18px;cursor:pointer;padding:4px;border-radius:50%;color:var(--text-primary);transition:background .15s;line-height:1}
.dark-toggle:hover{background:var(--gray-light)}
.signin-overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#2C3A4B 0%,var(--primary) 50%,#6B7F95 100%);overflow:hidden}
.signin-overlay.hidden{display:none}
.signin-overlay.hidden~.app{display:flex}
.app{display:none}
.signin-overlay::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(255,255,255,.06) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(255,255,255,.04) 0%,transparent 50%)}
.signin-card{position:relative;width:400px;max-width:90vw;background:var(--white);border-radius:16px;box-shadow:0 25px 60px rgba(0,0,0,.3),0 0 0 1px rgba(255,255,255,.08);padding:48px 40px 36px;text-align:center;animation:fadeSlideUp .5s ease}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.signin-logo{margin-bottom:8px}
.signin-logo-img{width:120px;height:auto;max-height:100px;margin:0 auto 4px;display:block;object-fit:contain}
.signin-badge{display:inline-block;padding:3px 12px;background:var(--primary-light);color:var(--primary);font-size:11px;font-weight:600;border-radius:12px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.signin-title{font-size:26px;font-weight:700;color:var(--text-primary);margin-bottom:4px}
.signin-subtitle{font-size:14px;color:var(--text-secondary);margin-bottom:28px}
.signin-error{display:none;background:#FDE8E8;color:#D92C2C;font-size:12px;padding:10px 14px;border-radius:8px;margin-bottom:16px;text-align:left;line-height:1.4}
.signin-error.show{display:block}
.signin-progress{display:none;align-items:center;justify-content:center;gap:10px;padding:10px 0;margin-bottom:16px;font-size:13px;color:var(--text-secondary)}
.signin-progress.show{display:flex}
.signin-progress .spinner{width:18px;height:18px;border:2px solid var(--gray-border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
.signin-btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px 24px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(0,0,0,.2)}
.signin-btn:hover{background:var(--primary-dark);box-shadow:0 6px 20px rgba(0,0,0,.25);transform:translateY(-1px)}
.signin-btn:active{transform:translateY(0);box-shadow:0 2px 8px rgba(0,0,0,.15)}
.signin-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.signin-footer{font-size:11px;color:var(--text-secondary);margin-top:20px}
@media(max-width:768px){
  .main{flex-direction:column}
  .form-panel{width:95vw;max-height:90vh}
  .toolbar{flex-wrap:wrap}
  .header h1{font-size:13px}
  .signin-card{padding:36px 24px 28px}
  .signin-title{font-size:22px}
}
</style>
</head>
<body>
<div class="signin-overlay" id="signin-overlay">
  <div class="signin-card" id="signin-card">
    <div class="signin-logo" id="signin-logo">
      <div style="width:80px;height:80px;background:var(--primary);border-radius:16px;display:flex;align-items:center;justify-content:center;color:white;font-size:36px;font-weight:700;margin:0 auto">AE</div>
    </div>
    <div class="signin-badge" id="signin-badge">DC Form</div>
    <h1 class="signin-title">AlEnshaiah</h1>
    <p class="signin-subtitle">DC Log &middot; Data Entry</p>
    <div class="signin-error" id="signin-error"></div>
    <div class="signin-progress" id="signin-progress"><div class="spinner"></div><span>Authenticating...</span></div>
    <button class="signin-btn" id="signin-btn" onclick="loginSP()">
      <svg width="18" height="18" viewBox="0 0 21 21" fill="none"><rect x="1" y="1" width="9" height="9" fill="#F25022"/><rect x="11" y="1" width="9" height="9" fill="#7FBA00"/><rect x="1" y="11" width="9" height="9" fill="#00A4EF"/><rect x="11" y="11" width="9" height="9" fill="#FFB900"/></svg>

// ======================== HELPERS ========================
function htmlEscape(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function stripHtml(s){const d=document.createElement('div');d.innerHTML=String(s);return d.textContent||d.innerText||'';}

function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type+' show';

}

}

function setStatusMsg(msg,isError){

  el.textContent=msg||'';
  el.style.display=msg?'':'none';
  el.style.background=isError?'var(--red-light)':'var(--yellow-light)';
  el.style.color=isError?'var(--red)':'#8A6D00';
}

// ======================== AUTH ========================
function initMsal(){
  const tenant=storage.getItem('dcform-tenant')||'684547e2-bb8b-450a-a3e1-3a6bc15e9471';
  const client=storage.getItem('dcform-client')||'04f83c11-e51c-4a8a-be86-9e3a49f3e952';
  if(!tenant||!client) return false;
  try{
    msalApp = new msal.PublicClientApplication({
      auth:{ clientId:client, authority:'https://login.microsoftonline.com/'+tenant, redirectUri:location.origin+location.pathname },
      cache:{ cacheLocation:'localStorage' },
      system:{ allowNativeBroker:false, loggerOptions:{ loggerCallback:()=>{}, piiLoggingEnabled:false } }
    });
    return true;
  }catch(e){
    console.error('MSAL init failed:',e);
    return false;
  }
}

async function loginSP(){
  if(location.protocol==='file:'){ showSigninError('⚠️ Cannot sign in from a local file. Deploy to GitHub Pages or a web server to use SSO authentication.'); return; }
  if(typeof msal==='undefined'){ showSigninError('⚠️ Microsoft Authentication Library (MSAL) failed to load. Check your internet connection or ad blocker and reload.'); return; }
  if(!initMsal()){ showSigninError('⚠️ Azure AD is not configured. Click the ⚙️ link below to set up your Tenant ID and Client ID.'); return; }
  showSigninProgress(true);
  try{
    const resp = await msalApp.loginPopup({ scopes: SP_SCOPES });
    handleAuthResponse(resp);
  }catch(e){
    showSigninProgress(false);
    if(e.message&&e.message.includes('popup_window_error')){ showSigninError('⚠️ Popup was blocked. Allow popups for this site and try again.'); }
    else{ showSigninError('Login failed: '+e.message); }
  }
}

async function ssoSilentAttempt(){
  if(!msalApp) return false;
  try{
    const resp = await msalApp.ssoSilent({ scopes: SP_SCOPES });
    handleAuthResponse(resp);
    return true;
  }catch(e){
    return false;
  }
}

async function getTokenSP(){
  if(!msalApp||!spUser) return null;
  try{
    const resp = await msalApp.acquireTokenSilent({ scopes: SP_SCOPES, account: spUser });
    spToken = resp.accessToken; return spToken;
  }catch(e){
    if(spToken) return spToken;
    return null;
  }
}

async function loadUserPerms(){
  myPerms=null;
  if(!spUser||!spToken)return;
  const email=spUser.username||'';
  if(!email)return;
  if(email.toLowerCase()===ADMIN_EMAIL.toLowerCase()){myPerms='ALL';return;}
  const siteUrl='https://sascontractingsa.sharepoint.com/sites/Alenshaiah';
  try{
    const token=await ensureSpSiteToken(siteUrl);
    const url=siteUrl+'/_api/web/lists/getbytitle(\''+PERM_LIST+'\')/items';
    const resp=await fetch(url,{headers:{'Authorization':'Bearer '+token,'Accept':'application/json'}});
    if(!resp.ok){myPerms=null;return;}
    const data=await resp.json();
    const items=data.d?data.d.results:data.value||[];
    if(!items.length){myPerms=null;return}
    myPerms={};
    let userFound=false;
    const userLower=email.toLowerCase();
    const currentApp='DCForm';
    items.forEach(item=>{
      if((item.Title||'').toLowerCase()===userLower){
        userFound=true;
        const app=item.App||'Both';
        if(app===currentApp||app==='Both'){
          myPerms[item.DeptID]=item.Access.toLowerCase();
        }
      }
    });
    if(!userFound||!Object.keys(myPerms).length) myPerms=null;
  }catch(e){
    if(e.message&&!e.message.includes('404'))console.error('Perm load:',e);
    myPerms=null;
  }
}

function getMyAccess(deptId){
  if(myPerms==='ALL')return 'edit';
  if(!myPerms)return 'none';
  return myPerms[deptId]||'none';
}

function hasAnyFormAccess(){
  if(myPerms==='ALL') return true;
  if(!myPerms) return false;
  return DEPTS.some(d=>getMyAccess(d.id)!=='none');
}

function handleAuthResponse(resp){
  if(resp&&resp.account){
    spUser=resp.account; spToken=resp.accessToken;
    showSigninProgress(false); hideSigninOverlay(); updateAuthUI();
    loadUserPerms().then(()=>{
      initDeptSelect();
      if(!hasAnyFormAccess()){
        setEmpty('🔒','Access Denied',ACCESS_DENIED_MSG);
        document.getElementById('dept-select').disabled=true;
        return;
      }
      const d=storage.getItem('dcform-last-dept'); if(d)onDeptChange();
    });
  }else{
    showSigninProgress(false); updateAuthUI();
  }
}

function logoutSP(){
  spToken=null; spUser=null; spSiteToken=null;
  if(msalApp) msalApp.logoutPopup();
  updateAuthUI(); onDeptChange();
}

function showSigninError(msg){
  const el=document.getElementById('signin-error');

// ======================== SHAREPOINT API ========================
function spRestListUrl(siteUrl,listName){
  const s=siteUrl.replace(/\/+$/,'');
  return s+"/_api/web/lists/getbytitle('"+listName.replace(/'/g,"''")+"')";
}
function spRestAttachmentsUrl(siteUrl,listName,itemId){
  return spRestListUrl(siteUrl,listName)+'/items('+itemId+')/AttachmentFiles';
}

async function ensureSpSiteToken(siteUrl){
  if(!msalApp||!spUser)throw new Error('Not authenticated');
  try{
    if(spSiteToken){const u=new URL(siteUrl);const r=await fetch(u.origin+'/_api/web/currentuser',{headers:{'Authorization':'Bearer '+spSiteToken}});if(r.ok)return spSiteToken;}
  }catch{}
  const u=new URL(siteUrl);
  const resp=await msalApp.acquireTokenSilent({scopes:[u.origin+'/.default'],account:spUser});
  spSiteToken=resp.accessToken;
  return spSiteToken;
}
async function spApiCall(url,method,body,binary){
  const token=await ensureSpSiteToken(currentDept.site);
  const opts={method:method||'GET',headers:{'Authorization':'Bearer '+token,'Accept':'application/json'}};
  if(body&&!binary){opts.headers['Content-Type']='application/json';opts.body=JSON.stringify(body);}
  else if(body&&binary){opts.headers['Content-Type']='application/octet-stream';opts.body=body;}
  const resp=await fetch(url,opts);
  if(!resp.ok){const t=await resp.text().catch(()=>'');throw new Error(`HTTP ${resp.status}: ${t.substring(0,200)}`);}
  return resp;
}

const SKIP_COLS = new Set([
  'ContentType','AuthorLookupId','EditorLookupId','_UIVersionString','Attachments','Edit',
  'LinkTitleNoMenu','LinkTitle','ItemChildCount','FolderChildCount',
  '_ComplianceFlags','_ComplianceTag','_ComplianceTagWrittenTime','_ComplianceTagUserId',
  'AppAuthorLookupId','AppEditorLookupId','@odata.etag',
  'ID','id','Modified','Created','Title',
  'FileSystemObjectType','ServerUrl','EncodedAbsUrl','BaseName','FileRef','FileLeafRef',
  'UniqueId','ProgId','CheckoutUserId','CheckoutUser','CheckedOutUserId','CheckedOutUser',
  'HasCopyDestinations','CopySource','OData__UIVersionString','UIVersion',
  'Order','GUID','WorkflowInstanceId','WorkflowVersion','WorkflowName','File_x0020_Type',
  'DocIcon','XMLTZone','_HasCopyDestinations','_CopySource','ScopeId','LinkFilename',
  'LinkFilenameNoMenu','FSObjType','SortBehavior','PermMask','FileDirRef','Last_x0020_Modified',
  'Created_x0020_Date','Editor','Author'
]);
const EXPORT_SKIP_COLS = SKIP_COLS;

const SP_FIELD_MAP = {
  'Text':'text','Note':'note','Choice':'choice','MultiChoice':'multiChoice',
  'Boolean':'boolean','DateTime':'date','Number':'number','Currency':'currency',
  'Lookup':'lookup','User':'person','URL':'url','Calculated':'text',
  'ModStat':'skip','WorkflowStatus':'skip','WorkflowEventType':'skip',
  'ThreadingInfo':'skip','File':'skip','Attachments':'skip'
};

async function fetchColumnDefinitions(siteUrl,listName){
  const url=spRestListUrl(siteUrl,listName)+'/fields';
  const token=await ensureSpSiteToken(siteUrl);
  const resp=await fetch(url,{headers:{'Authorization':'Bearer '+token,'Accept':'application/json'}});
  if(!resp.ok){const t=await resp.text().catch(()=>'');throw new Error(`HTTP ${resp.status}: ${t.substring(0,200)}`);}
  const json=await resp.json();
  const raw=json.d?json.d.results:(json.value||[]);
  const cols=[];const seen=new Set();
  raw.forEach(f=>{
    const n=f.InternalName;
    if(!n||SKIP_COLS.has(n)||n.startsWith('_')||seen.has(n)||f.Hidden||f.ReadOnlyField)return;
    seen.add(n);
    const ts=f.TypeAsString||'Text';
    let type=SP_FIELD_MAP[ts]||'text';
    if(type==='skip')return;
    let choices=null;
    if(f.Choices&&f.Choices.results&&f.Choices.results.length)choices=f.Choices.results;
    cols.push({name:n,displayName:f.Title||n,type,choices,required:f.Required||false,description:f.Description||''});
  });
  return cols;
}

function spVal(v){
  if(v==null)return'';
  if(typeof v!=='object')return v;
  if(v.LookupValue!==undefined)return v.LookupValue;
  if(v.results!==undefined)return v.results.join('; ');
  if(v.UserName!==undefined)return v.UserName||v.Title||'';
  if(v.Description!==undefined)return v.Description;
  if(v.Url!==undefined)return v.Url;
  if(v.DisplayUrl!==undefined)return v.DisplayUrl;
  if(Array.isArray(v))return v.join(', ');
  try{return JSON.stringify(v);}catch(e){return'';}
}

async function fetchSPItems(siteUrl,listName){
  const base=spRestListUrl(siteUrl,listName)+'/items';
  let allItems=[];
  let nextUrl=base+'?$top=5000&$orderby=ID desc';
  while(nextUrl){
    const token=await ensureSpSiteToken(siteUrl);
    const resp=await fetch(nextUrl,{headers:{'Authorization':'Bearer '+token,'Accept':'application/json'}});
    if(!resp.ok){const t=await resp.text().catch(()=>'');throw new Error(`HTTP ${resp.status}: ${t.substring(0,200)}`);}
    const json=await resp.json();
    const items=json.d?json.d.results:(json.value||[]);
    allItems=allItems.concat(items.map(it=>{
      const fields={};
      for(const [k,v] of Object.entries(it)){
        if(k.startsWith('@odata')||k==='ID'||k==='Id'||k==='odata.type'||k==='odata.id')continue;
        const dn=renameMap[k]||k;
        const val=spVal(v);
        fields[dn]=val;
        if(dn!==k)fields[k]=val;
      }
      return {...fields,_id:it.ID||it.Id,_etag:''};
    }));
    nextUrl=(json.d&&json.d.__next)?json.d.__next:(json['@odata.nextLink']||null);
  }
  return allItems;
}

async function createSPItem(siteUrl,listName,itemFields){
  const body={};
  for(const [k,v] of Object.entries(itemFields)){if(!k.startsWith('_'))body[k]=v;}
  const token=await ensureSpSiteToken(siteUrl);
  const url=spRestListUrl(siteUrl,listName)+'/items';
  const resp=await fetch(url,{method:'POST',headers:{'Authorization':'Bearer '+token,'Accept':'application/json','Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!resp.ok){const t=await resp.text().catch(()=>'');throw new Error(`HTTP ${resp.status}: ${t.substring(0,200)}`);}
  return await resp.json();
}

async function updateSPItem(siteUrl,listName,itemId,itemFields){
  const body={};
  for(const [k,v] of Object.entries(itemFields)){if(!k.startsWith('_'))body[k]=v;}
  const listEnc=listName.replace(/'/g,"''");
  const url=`${siteUrl.replace(/\/+$/,'')}/_api/web/lists/getbytitle('${listEnc}')/items(${itemId})`;
  const token=await ensureSpSiteToken(siteUrl);
  const opts={
    method:'POST',
    headers:{
      'Authorization':'Bearer '+token,
      'Accept':'application/json',
      'Content-Type':'application/json',
      'IF-MATCH':'*',
      'X-HTTP-Method':'MERGE'
    },
    body:JSON.stringify(body)
  };
  const resp=await fetch(url,opts);
  if(!resp.ok){let txt;try{txt=await resp.text();}catch{txt='';}throw new Error(`SP PATCH HTTP ${resp.status}: ${txt.substring(0,300)}`);}
  return resp;
}

async function spApiCallJson(url,method,body,binary){
  const resp=await spApiCall(url,method,body,binary);
  return await resp.json();
}

async function fetchAttachments(siteUrl,listName,itemId){
  const url=spRestAttachmentsUrl(siteUrl,listName,itemId);
  const json=await spApiCallJson(url);
  const files=json.value||(json.d&&json.d.results)||[];
  return files.map(f=>({id:f.FileName||f.id,name:f.FileName||f.name,size:f.Length||f.size||0,fileName:f.FileName||f.name}));
}
async function deleteAttachment(siteUrl,listName,itemId,attachmentName){
  const url=spRestAttachmentsUrl(siteUrl,listName,itemId)+`/getByFileName('${attachmentName.replace(/'/g,"''")}')/deleteObject`;
  await spApiCall(url,'POST');
}
async function uploadAttachment(siteUrl,listName,itemId,fileName,binaryBlob){
  const url=spRestAttachmentsUrl(siteUrl,listName,itemId)+`/add(FileName='${fileName.replace(/'/g,"''")}')`;
  try{
    await spApiCall(url,'POST',binaryBlob,true);
  }catch(e){
    if(e.message&&e.message.includes('already in use')){
      await deleteAttachment(siteUrl,listName,itemId,fileName);
      await spApiCall(url,'POST',binaryBlob,true);
    }else{
      throw e;
    }
  }
}
async function downloadAttachment(attachmentName,fileName){
  fileName=decodeURIComponent(fileName);
  const name=decodeURIComponent(attachmentName);
  const url=spRestAttachmentsUrl(currentDept.site,currentDept.list,editingId)+`/getByFileName('${name.replace(/'/g,"''")}')/$value`;
  const resp=await spApiCall(url);
  const blob=await resp.blob();
  const blobUrl=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=blobUrl;a.download=fileName;a.click();
  URL.revokeObjectURL(blobUrl);
}
async function downloadViewAttachment(attachmentName,itemId){
  const name=decodeURIComponent(attachmentName);
  const url=spRestAttachmentsUrl(currentDept.site,currentDept.list,itemId)+`/getByFileName('${name.replace(/'/g,"''")}')/$value`;
  const resp=await spApiCall(url);
  const blob=await resp.blob();
  const blobUrl=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=blobUrl;a.download=name;a.click();
  URL.revokeObjectURL(blobUrl);
}

async function loadAttachmentsList(){
  const el=document.getElementById('attachment-list');

  try{
    const atts=await fetchAttachments(currentDept.site,currentDept.list,editingId);
    if(!atts.length){el.innerHTML='<div class="attachment-empty">No attachments</div>';return;}
    el.innerHTML=atts.map(a=>{
      const name=htmlEscape(a.name);
      const size=a.size?` <span class="size">${fmtSize(a.size)}</span>`:'';
      const jsName=encodeURIComponent(a.name);
      return `<div class="attachment-item"><span class="name">${name}</span>${size}<button class="btn-icon download" title="Download" onclick="downloadAttachment('${jsName}','${jsName}')">⬇</button><button class="btn-icon delete" title="Delete" onclick="deleteAttachmentItem('${jsName}')">✕</button></div>`;
    }).join('');
  }catch(e){
    console.error('loadAttachments:',e);
    el.innerHTML='<div class="attachment-empty">Failed to load attachments</div>';
  }
}

function fmtSize(bytes){
  if(!bytes)return '';
  if(bytes<1024)return bytes+' B';
  if(bytes<1048576)return (bytes/1024).toFixed(1)+' KB';
  return (bytes/1048576).toFixed(1)+' MB';
}

async function fetchAllAttachmentCounts(){
  if(!currentDept||!allItems.length)return;
  const ids=allItems.map(i=>i._id);
  for(let i=0;i<ids.length;i+=20){
    const batch=ids.slice(i,i+20);
    const results=await Promise.allSettled(batch.map(id=>
      fetchAttachments(currentDept.site,currentDept.list,id).then(atts=>({id,count:atts.length}))
    ));
    results.forEach(r=>{if(r.status==='fulfilled')attachmentCounts[r.value.id]=r.value.count;});
  }
  if(currentDept)renderTable();
}

// ======================== TABLE ========================
function reorderColumns(cols){
  if(currentDept&&currentDept.id==='calculations'){
    const order=['S.No','TYPE','SHEET NAME','PHASE','BUILDING/PART','DISCIPLINE','EXPECTED SUBMISSION DATE','DRAWING STATUS'];
    const idxMap={};
    cols.forEach((c,i)=>{const idx=order.findIndex(o=>o.toUpperCase()===c.displayName.toUpperCase());if(idx>=0)idxMap[c.name]=idx;});
    const known=[],unknown=[];
    cols.forEach(c=>{(idxMap[c.name]!==undefined?known:unknown).push(c);});
    known.sort((a,b)=>idxMap[a.name]-idxMap[b.name]);
    return [...known,...unknown];
  }
  const result=[...cols];
  const descIdx=result.findIndex(c=>/(description|matDesc)/i.test(c.name)||/(description)/i.test(c.displayName));
  const rfqIdx=result.findIndex(c=>/(rfq)/i.test(c.name)||/(rfq)/i.test(c.displayName));
  if(descIdx>=0&&rfqIdx>=0&&rfqIdx!==descIdx+1){
    const [rfq]=result.splice(rfqIdx,1);
    const adjDescIdx=rfqIdx<descIdx?descIdx-1:descIdx;
    result.splice(adjDescIdx+1,0,rfq);
  }
  return result;
}
function fmtVal(v){
  if(typeof v==='string'&&/^\d{4}-\d{2}-\d{2}[T ]/.test(v))return v.substring(0,10);
  return String(v??'');
}
function reorderForExport(cols){
  if(currentDept&&currentDept.id==='calculations'){
    const order=['S.No','TYPE','SHEET NAME','PHASE','BUILDING/PART','DISCIPLINE','EXPECTED SUBMISSION DATE','DRAWING STATUS'];
    const orderUpper=order.map(o=>o.toUpperCase());
    const known=[],unknown=[];
    cols.forEach(c=>{
      const dnUpper=c.displayName?c.displayName.toUpperCase():c.name.toUpperCase();
      const idx=orderUpper.indexOf(dnUpper);
      if(idx>=0)known.push({col:c,idx});
      else unknown.push(c);
    });
    known.sort((a,b)=>a.idx-b.idx);
    const result=[...known.map(k=>k.col),...unknown];
    const remarkIdx=result.findIndex(c=>/(remarks)/i.test(c.name)||/(remarks)/i.test(c.displayName));
    if(remarkIdx>=0)result.splice(remarkIdx+1);
    return result;
  }
  const result=[...cols];
  const descIdx=result.findIndex(c=>/(description|matDesc)/i.test(c.name)||/(description)/i.test(c.displayName));
  const rfqIdx=result.findIndex(c=>/(rfq)/i.test(c.name)||/(rfq)/i.test(c.displayName));
  if(descIdx>=0&&rfqIdx>=0&&rfqIdx!==descIdx+1){
    const [rfq]=result.splice(rfqIdx,1);
    const adjDescIdx=rfqIdx<descIdx?descIdx-1:descIdx;
    result.splice(adjDescIdx+1,0,rfq);
  }
  const remarkIdx=result.findIndex(c=>/(remarks)/i.test(c.name)||/(remarks)/i.test(c.displayName));
  if(remarkIdx>=0)result.splice(remarkIdx+1);
  return result;
}
function renderTable(){
  if(!currentDept||filteredItems.length===0){
    if(currentDept)setEmpty('🔍','No results','Try a different search or click + New Item.');
    else setEmpty('📋','Select a department','Choose a department above.');

  if(titleCol&&!shownCols.includes(titleCol))shownCols.unshift(titleCol);

  document.getElementById('table-body').innerHTML=filteredItems.map((item,i)=>{
    const isSel=selectedItem&&item._id===selectedItem._id;
    const aN=attachmentCounts[item._id];
    return `<tr class="${isSel?'selected':''}" onclick="openDetail(${i})">
      <td><span style="color:var(--blue);font-size:11px;cursor:pointer" onclick="event.stopPropagation();startEdit(${i})">✏️</span></td>
      <td style="color:var(--text-secondary)">${i+1}</td>
      <td style="text-align:center;font-size:12px;color:var(--text-secondary)">${aN>0?'📎'+aN:aN===0?'—':''}</td>
      ${shownCols.map(c=>{
        const lookup=c.displayName||c.name;
        let v=item[lookup]!==undefined?item[lookup]:'';
        if(v&&typeof v==='object'){v=v.LookupValue||v.Title||v.Email||JSON.stringify(v).substring(0,50);}
        if(c.type==='boolean')v=v?'✓':'';
        const s=htmlEscape(stripHtml(v));
        return `<td title="${s}">${s.substring(0,80)}</td>`;
      }).join('')}
    </tr>`;
  }).join('');
}

async function saveItem(){
  document.getElementById('save-btn').disabled=true;
  const statusEl=document.getElementById('save-status');
  statusEl.className='save-status saving'; statusEl.textContent='Saving...';
  try{
    const fields={};
    const skipForm=new Set(['_id','_etag','ID','ContentType','AppAuthor','AppEditor','Author','Editor','Created','Modified']);
    columnDefs.forEach(c=>{
      if(skipForm.has(c.name))return;
      const fid='f_'+c.name.replace(/[^a-zA-Z0-9_-]/g,'_');
      const el=document.getElementById(fid);
      if(!el)return;
      let val;
      if(c.type==='multiChoice'){
        const inputs=document.querySelectorAll('#'+fid+' input[type=checkbox]:checked');
        val=inputs.length>0?Array.from(inputs).map(inp=>inp.value).join('; '):null;
      }else if(c.type==='boolean'){
        val=el.value; if(val==='1'||val==='true')val=true; else if(val==='0'||val==='false')val=false; else val=null;
      }else if(c.type==='number'||c.type==='currency'){val=el.value!==''?Number(el.value):null;}
      else if(c.type==='date'){val=el.value||null;}
      else{val=el.value||null;}
      if(val!==null&&val!=='')fields[c.name]=val;
      else if(val===null||val==='')fields[c.name]=null;
    });
    if(!currentDept)throw new Error('No department selected');
    console.log('SAVE:',{editingId,fields,dept:currentDept.id,list:currentDept.list});
    if(Object.keys(fields).length===0)throw new Error('No fields to save - form fields may be empty');
    if(editingId){await updateSPItem(currentDept.site,currentDept.list,editingId,fields); statusEl.textContent='✓ Updated'; showToast('Item updated','success');}
    else{await createSPItem(currentDept.site,currentDept.list,fields); statusEl.textContent='✓ Created'; showToast('Item created','success');}
    statusEl.className='save-status saved';
    await refreshItems();
    setTimeout(()=>closeForm(),600);
  }catch(e){
    console.error('Save:',e);
    statusEl.className='save-status error'; statusEl.textContent='✗ '+e.message;
    showToast('Save failed: '+e.message,'error');
  }
  document.getElementById('save-btn').disabled=false;
}

function downloadTemplate(){
  if(!columnDefs.length||!currentDept){showToast('No columns loaded','error');return;}
  const cols=columnDefs;
  const headers=cols.map(c=>c.displayName||c.name);
  const sample=cols.map(c=>{
    if(c.type==='date')return '2025-01-01';
    if(c.type==='choice'&&c.choices&&c.choices.length)return c.choices[0];
    if(c.type==='number'||c.type==='currency')return '0';
    if(c.type==='boolean')return 'true';
    return '';
  });
  const esc=(v)=>'"'+String(v).replace(/"/g,'""')+'"';
  const csv=esc('Title')+','+headers.map(esc).join(',')+'\n'+
            esc('Sample Item')+','+sample.map(esc).join(',')+'\n'+
            esc('')+','+headers.map(()=>'').join(',')+'\n';
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=(currentDept.title||'template')+'_template.csv';
  a.click();URL.revokeObjectURL(a.href);
  showToast('Template downloaded','success');
}

function handleBulkFile(files){
  if(!files||!files.length)return;
  const file=files[0];
  const reader=new FileReader();
  reader.onload=function(e){
    const text=e.target.result;
    parseBulkCSV(text);
  };
  reader.readAsText(file);
}

function parseBulkCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2){showToast('CSV must have headers and at least one data row','error');return;}
  const headers=parseCSVLine(lines[0]);
  const rows=lines.slice(1).map(l=>parseCSVLine(l));
  const nonEmptyRows=rows.filter(r=>r.some(c=>c.trim()));
  if(!nonEmptyRows.length){showToast('No data rows found','error');return;}
  const colDefs=columnDefs.filter(c=>!c.name.startsWith('_')&&c.name!=='ID'&&c.name!=='ContentType');
  const mapping=headers.map(h=>{
    const trimmed=h.trim();
    const match=colDefs.find(c=>(c.displayName||c.name).toLowerCase()===trimmed.toLowerCase());
    return {header:trimmed,col:match||null,skip:!match};
  });
  const previewRows=nonEmptyRows.slice(0,10);
  let html='<div style="margin-bottom:8px;font-size:12px;color:var(--text-secondary)">'+
    '<strong>'+nonEmptyRows.length+'</strong> row(s) parsed'+
    ' · <strong>'+mapping.filter(m=>m.col).length+'/'+headers.length+'</strong> columns matched'+
    (nonEmptyRows.length>10?' · showing first 10':'')+
    '</div>';
  html+=`<div class="bulk-preview"><table><thead><tr>`;
  mapping.forEach(m=>{
    html+=`<th title="${m.col?m.col.displayName+' ('+m.col.name+')':'Unmatched column'}">${htmlEscape(m.header)}${m.skip?' <span style="color:var(--orange);font-size:10px">⚠️ skip</span>':''}</th>`;
  });
  html+=`</tr></thead><tbody>`;
  previewRows.forEach(row=>{
    html+=`<tr>`;
    row.forEach((cell,i)=>{
      html+=`<td>${htmlEscape(cell.substring(0,100))}</td>`;
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table></div>`;
  const mappedCount=mapping.filter(m=>m.col).length;
  document.getElementById('bulk-preview-area').innerHTML=html;
  document.getElementById('bulk-import-btn').disabled=mappedCount===0||nonEmptyRows.length===0;
  bulkData={headers,rows:nonEmptyRows,mapping};
}

function parseCSVLine(line){
  const result=[];let current='',inQuotes=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(inQuotes){
      if(c==='"'){if(line[i+1]==='"'){current+='"';i++;}else inQuotes=false;}
      else current+=c;
    }else{
      if(c==='"')inQuotes=true;
      else if(c===','){result.push(current);current='';}
      else current+=c;
    }
  }
  result.push(current);
  return result;
}

async function importBulkItems(){
  if(!bulkData||!bulkData.rows.length||!currentDept||!spToken)return;
  const btn=document.getElementById('bulk-import-btn');
  const statusEl=document.getElementById('bulk-status');
  btn.disabled=true;statusEl.className='save-status saving';statusEl.textContent='Importing...';
  const validCols=bulkData.mapping.filter(m=>m.col).map(m=>m.col.name);
  const total=bulkData.rows.length;
  let success=0,fail=0;
  for(let i=0;i<total;i++){
    const row=bulkData.rows[i];
    const fields={};
    bulkData.mapping.forEach((m,ci)=>{
      if(m.col&&row[ci]!==undefined&&row[ci].trim()!==''){
        let val=row[ci].trim();
        if(m.col.type==='number'||m.col.type==='currency'){const n=Number(val);if(!isNaN(n))val=n;}
        else if(m.col.type==='boolean'){val=val.toLowerCase()==='true'||val==='1'||val==='yes';}
        fields[m.col.name]=val;
      }
    });
    try{
      await createSPItem(currentDept.site,currentDept.list,fields);
      success++;
    }catch(e){
      fail++;
      console.error('Bulk import row '+i+':',e.message);
    }
    if(i%5===0||i===total-1){
      statusEl.textContent='Importing... '+Math.round((i+1)/total*100)+'% ('+success+' ok, '+fail+' failed)';
    }
  }
  statusEl.className='save-status '+(fail===0?'saved':'error');
  statusEl.textContent=fail===0?'✓ '+success+' items created':'✓ '+success+' created, ✗ '+fail+' failed';
  showToast(fail===0?'All '+success+' items created':success+' created, '+fail+' failed','success');
  await refreshItems();
  btn.disabled=false;
  if(fail===0)setTimeout(()=>closeBulkUpload(),1500);
}

async function runExport(){
  const btn=document.getElementById('export-btn');
  const status=document.getElementById('export-status');
  btn.disabled=true;status.className='save-status saving';status.textContent='Preparing...';
  try{
    const format=document.querySelector('input[name="export-format"]:checked').value;

    const dateFrom=document.getElementById('export-date-from')?document.getElementById('export-date-from').value:'';
    const dateTo=document.getElementById('export-date-to')?document.getElementById('export-date-to').value:'';
    const choiceFilters={};
    document.querySelectorAll('.export-choice').forEach(cb=>{
      if(!cb.checked){
        if(!choiceFilters[cb.dataset.col])choiceFilters[cb.dataset.col]=[];
        choiceFilters[cb.dataset.col].push(cb.value);
      }
    });
    const excludeChoices=Object.keys(choiceFilters).length?choiceFilters:null;
    const fn=htmlEscape(currentDept.title).replace(/[^a-z0-9]/gi,'_')+'_Export_'+new Date().toISOString().slice(0,10);

      let items=dept.id===currentDept.id?filteredItems:await fetchSPItems(dept.site,dept.list);
      let cols=dept.id===currentDept.id?columnDefs:await fetchColumnDefinitions(dept.site,dept.list);
      items=applyExportFilters(items,cols,dateFrom,dateTo,excludeChoices);
      if(format==='excel'){await exportExcel(items,cols,dept,dateFrom,dateTo,excludeChoices,fn,status);}
      else{await exportPDF(items,cols,dept,dateFrom,dateTo,excludeChoices,fn,status);}
    }

    showToast('Export complete','success');
  }catch(e){console.error('Export:',e);status.className='save-status error';status.textContent='Error: '+e.message;showToast('Export failed: '+e.message,'error');}
  btn.disabled=false;
}
function applyExportFilters(items,cols,dateFrom,dateTo,excludeChoices){
  let result=items;
  if(dateFrom||dateTo){
    const dateCols=cols.filter(c=>c.type==='date');
    if(dateCols.length){
      const dc=dateCols[0].name;
      result=result.filter(item=>{
        const val=item[dc];
        if(!val)return false;
        const d=new Date(val);
        if(isNaN(d.getTime()))return true;
        if(dateFrom&&d<new Date(dateFrom))return false;
        if(dateTo){const end=new Date(dateTo);end.setHours(23,59,59,999);if(d>end)return false;}
        return true;
      });
    }
  }
  if(excludeChoices){
    Object.keys(excludeChoices).forEach(col=>{
      const excluded=excludeChoices[col];
      result=result.filter(item=>!excluded.includes(item[col]));
    });
  }
  return result;
}

function downloadBlob(blob,name){
  const safeName=name.replace(/[<>:"/\\|?*]/g,'_');
  // Method 1: anchor click with blob URL
  try{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=safeName;a.style.display='none';
    document.body.appendChild(a);a.click();
    setTimeout(()=>document.body.removeChild(a),1000);
    return;
  }catch(e){console.warn('downloadBlob method 1 failed:',e);}
  // Method 2: window.open fallback
  try{
    const url=URL.createObjectURL(blob);
    window.open(url,'_blank');
    setTimeout(()=>URL.revokeObjectURL(url),30000);
  }catch(e){console.warn('downloadBlob method 2 failed:',e);}
}

function calcColWidths(headers,data,usableWidth){
  const n=headers.length;
  if(n===0)return[];
  const minW=10,maxW=70;
  // Content weight per column (header + data length)
  const weights=headers.map((h,i)=>{
    let maxLen=h.length;
    for(let r=0;r<Math.min(data.length,200);r++){
      if(data[r]&&data[r][i])maxLen=Math.max(maxLen,String(data[r][i]).length);
    }
    return Math.max(maxLen,1);
  });
  const totalW=weights.reduce((a,b)=>a+b,0);
  if(totalW<=0)return Array(n).fill(usableWidth/n);
  // Distribute proportionally
  let widths=weights.map(w=>(w/totalW)*usableWidth);
  // Iteratively enforce min/max and redistribute surplus/deficit
  for(let iter=0;iter<20;iter++){
    const clamped=widths.map(w=>Math.max(minW,Math.min(maxW,w)));
    const sum=clamped.reduce((a,b)=>a+b,0);
    if(Math.abs(sum-usableWidth)<0.5)return clamped;
    const freeIdx=[];
    for(let i=0;i<n;i++)if(clamped[i]>minW&&clamped[i]<maxW)freeIdx.push(i);
    if(freeIdx.length===0)return clamped;
    const diff=usableWidth-sum;
    const freeWeight=freeIdx.reduce((s,i)=>s+weights[i],0);
    if(freeWeight<=0)return clamped;
    widths=clamped.map((w,i)=>freeIdx.includes(i)?w+diff*(weights[i]/freeWeight):w);
  }
  return widths.map(w=>Math.max(minW,Math.min(maxW,w)));
}

function computeKpis(items){
  const kpis={total:items.length};
  if(!items.length)return kpis;
  const first=items[0];
  const statusKey=['status','WorkStatus','workStatus','STATUS','Status'].find(k=>first[k]!==undefined);
  if(statusKey){
    items.forEach(x=>{
      const v=(x[statusKey]||'').toLowerCase();
      if(/complete|done|acc\b.*comp|sdc\b.*comp/i.test(v))kpis.completed=(kpis.completed||0)+1;
      else if(/in.?progress|inprogress|for.?insp|under.?review|submitted|open/i.test(v))kpis.inProgress=(kpis.inProgress||0)+1;
      else if(/not.?start|yet.?to.?start/i.test(v))kpis.notStarted=(kpis.notStarted||0)+1;
      if(/overdue|delay/i.test(v))kpis.overdue=(kpis.overdue||0)+1;
    });
  }
  const progKey=['prog','Progress','progress','CompletionPct','DailyProgress','WeeklyProgress'].find(k=>first[k]!==undefined);
  if(progKey){
    const vals=items.map(x=>Number(x[progKey])).filter(v=>!isNaN(v));
    if(vals.length)kpis.avgProg=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
  }
  return kpis;
}
function computeProcurementKpis(items){
  function val(x){return x.matSubStatus||x['Material Submitta STATUS']||x['Material_x0020_Submitta_x0020_STATUS']||'';}
  function poIsIssued(x){
    const ad=x.actualPoDate||x['Actual PO']||x['Actual PO DATE']||x['ACTUAL PO DATE']||x['ACTUAL_x0020_PO_x0020_DATE']||'';
    if(ad&&ad!=='N/A')return true;
    const ps=x['Actual PO Status']||x['ACTUAL PO Status']||x['ACTUAL PO STATUS']||x['ACTUAL_x0020_PO_x0020_Status']||x['ACTUAL_x0020_PO_x0020_STATUS']||'';
    if(typeof ps==='string'&&ps.toLowerCase()==='done')return true;
    const pq=x.pqStatus||x['PQ  Status']||x['PQ_x0020__x0020_Status']||x['PQ_x0020_Status']||'';
    if(typeof pq==='string'&&pq.toLowerCase()==='done')return true;
    return x.poRef&&x.poRef!==''&&x.poRef!=='N/A';
  }
  function delIsDone(x){
    const ds=(x.deliveryStatus||x['Actual Delivery Status']||x['ACTUAL DELIVERY STATUS']||x['ACTUAL_x0020_DELIVERY_x0020_STATUS']||'').toLowerCase();
    return ds==='done'||ds==='as site required'||/deliver|receiv|complet/i.test(ds)&&!/pend|overdue|part/i.test(ds);
  }
  function isLongLead(x){const v=x.leadTime||x['Lead Time']||x['PROCUREMENT LEAD TIME']||x['PROCUREMENT_x0020_LEAD_x0020_TIME']||'';return Number(v)>60||(typeof v==='string'&&v.toLowerCase()==='lli');}
  function isPqApproved(x){const s=x.pqStatus||x['PQ  Status']||x['PQ_x0020__x0020_Status']||x['PQ_x0020_Status']||'';return /approv|accept|pass/i.test(s)||/^[be]$/i.test(s);}
  function isMarOpen(x){const m=val(x);return m&&m!==''&&m!=='N/A'&&m.toLowerCase()==='mar open';}
  function hasMat(x){const m=val(x);return m&&m!==''&&m!=='N/A';}
  const t=items.length;
  const pi=items.filter(poIsIssued).length;
  const pp=t-pi;
  const dd=items.filter(delIsDone).length;
  const dp=t-dd;
  const ll=items.filter(isLongLead).length;
  const pa=items.filter(isPqApproved).length;
  const ms=items.filter(hasMat).length;
  const ma=items.filter(x=>hasMat(x)&&!isMarOpen(x)).length;
  const mo=items.filter(isMarOpen).length;
  return {
    total:t,poIssued:pi,poPending:pp,delCompleted:dd,delPending:dp,
    longLead:ll,pqApproved:pa,matSubmitted:ms,matApproved:ma,openMar:mo
  };
}
function addKpiSection(doc,items,startY,dept){
  if(!items||!items.length)return startY;
  const isProc=dept&&dept.id==='procurement';
  const pw=doc.internal.pageSize.getWidth();
  const ml=6,gap=2,total=items.length;
  const CARD_BG=[240,240,242];  // gentle gray background
  const CARD_SHADOW=[210,210,215];
  // Status colors: green=on track, orange=fair, red=behind
  const G=[112,173,71],O=[37,150,190],R=[192,4,1],MAT=[15,107,120];
  // Status color based on percentage (same logic as project-tracker)
  function sc(pct,invert){
    if(invert){if(pct<=20)return G;if(pct<=50)return O;return R;}
    if(pct>=70)return G;if(pct>=40)return O;return R;
  }
  function tr(g,t){if(!t)return'';const r=g/t;return r>=0.7?'ON TRACK':r>=0.4?'FAIR':'BEHIND';}
  // Progress bar: gray track, fill in status color
  function drawProgressBar(x,y,w,pct,color){
    const bw=w-10,bh=2.2,bx=x+5,by=y;
    doc.setFillColor(220,220,225);
    doc.roundedRect(bx,by,bw,bh,1.1,1.1,'F');
    const fillW=Math.min(Math.max(pct,0),100)/100*bw;
    if(fillW>0.5){doc.setFillColor(...color);doc.roundedRect(bx,by,fillW,bh,1.1,1.1,'F');}
  }
  // Draw one KPI card with management-friendly design
  function drawCard(card,x,y,boxW,boxH){
    const col=card.c||[80,80,90];
    // Shadow
    doc.setFillColor(...CARD_SHADOW);
    doc.roundedRect(x+0.3,y+0.3,boxW,boxH,3,3,'F');
    // Gray card body
    doc.setFillColor(...CARD_BG);
    doc.roundedRect(x,y,boxW,boxH,3,3,'F');
    // Bold top accent line in status color
    doc.setDrawColor(...col);doc.setLineWidth(1.2);
    doc.line(x+4,y+0.5,x+boxW-4,y+0.5);
    // Trend label (top-right)
    if(card.t){
      doc.setFontSize(6);doc.setFont('helvetica','bold');doc.setTextColor(...col);
      doc.text(card.t,x+boxW-3,y+3,{align:'right'});
    }
    // Label (uppercase, bold, status-colored)
    doc.setFontSize(6.5);doc.setFont('helvetica','bold');doc.setTextColor(...col);
    doc.text(card.l.toUpperCase(),x+boxW/2,y+4.5,{align:'center'});
    // Count: "X / Y" (large, bold, status-colored)
    doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(...col);
    if(card.v!==undefined&&card.noTotal){
      doc.text(String(card.v),x+boxW/2,y+9.5,{align:'center'});
    }else if(card.v!==undefined&&card.p!==undefined){
      doc.text(card.v+' / '+total,x+boxW/2-2,y+9.5,{align:'right'});
      doc.setFontSize(7.5);doc.setFont('helvetica','bold');doc.setTextColor(100,100,110);
      doc.text(card.p+'%',x+boxW/2+3,y+9.5,{align:'left'});
    }else{
      doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(60,60,70);
      doc.text(String(card.v),x+boxW/2,y+9.5,{align:'center'});
    }
    // Progress bar at bottom
    if(card.p!==undefined)drawProgressBar(x,y+12,boxW,card.p,col);
    doc.setTextColor(0,0,0);doc.setFont('helvetica','normal');
  }
  // Centered start X for card rows (truly centered on page)
  function centerX(n,boxW){const tw=n*boxW+(n-1)*gap;return(pw-tw)/2;}
  if(isProc){
    const k=computeProcurementKpis(items);
    startY+=4;
    doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(60,60,80);
    doc.text('PERFORMANCE OVERVIEW',pw/2,startY,{align:'center'});
    doc.setTextColor(0,0,0);doc.setFont('helvetica','normal');
    const pc=v=>total?Math.round(v/total*100):0;
    const cards=[
      {l:'Total Items',v:total,c:[80,80,90],noTotal:true},
      {l:'PO Issued',v:k.poIssued,c:sc(pc(k.poIssued)),p:pc(k.poIssued),t:tr(k.poIssued,total)},
      {l:'PO Pending',v:k.poPending,c:sc(pc(k.poPending),true),p:pc(k.poPending),t:tr(total-k.poPending,total)},
      {l:'Del. Completed',v:k.delCompleted,c:sc(pc(k.delCompleted)),p:pc(k.delCompleted),t:tr(k.delCompleted,total)},
      {l:'Del. Pending',v:k.delPending,c:sc(pc(k.delPending),true),p:pc(k.delPending),t:tr(total-k.delPending,total)},
      {l:'Long Lead',v:k.longLead,c:[192,4,1],p:pc(k.longLead),t:tr(total-k.longLead,total)},
      {l:'PQ Approved',v:k.pqApproved,c:sc(pc(k.pqApproved)),p:pc(k.pqApproved),t:tr(k.pqApproved,total)},
      {l:'MAT Submitted',v:k.matSubmitted,c:MAT,p:pc(k.matSubmitted),t:tr(k.matSubmitted,total)},
      {l:'MAT Approved',v:k.matApproved,c:MAT,p:pc(k.matApproved),t:tr(k.matApproved,total)},
      {l:'Open MAR',v:k.openMar,c:sc(pc(k.openMar),true),p:pc(k.openMar),t:tr(total-k.openMar,total)}
    ];
    const cols=5,rows=2;
    const boxW=(pw-2*ml-(cols-1)*gap)/cols;
    const boxH=18;
    const sx=centerX(cols,boxW);
    const cardY=startY+5;
    for(let r=0;r<rows;r++){
      let x=sx;
      for(let c=0;c<cols;c++){
        const idx=r*cols+c;
        if(idx>=cards.length)break;
        drawCard(cards[idx],x,cardY+r*(boxH+gap),boxW,boxH);
        x+=boxW+gap;
      }
    }
    const sepY=cardY+rows*(boxH+gap)+3;
    doc.setDrawColor(200,200,205);doc.setLineWidth(0.6);
    doc.line(sx,sepY,sx+cols*boxW+(cols-1)*gap,sepY);
    doc.setTextColor(0,0,0);doc.setFont('helvetica','normal');
    return sepY+3;
  }
  const kpis=computeKpis(items);
  startY+=4;
  doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(60,60,80);
  doc.text('PERFORMANCE OVERVIEW',pw/2,startY,{align:'center'});
  doc.setTextColor(0,0,0);doc.setFont('helvetica','normal');
  const cards=[];
  cards.push({l:'Total Items',v:total,c:[80,80,90],noTotal:true});
  if(kpis.completed!==undefined)cards.push({l:'Completed',v:kpis.completed,c:G});
  if(kpis.inProgress!==undefined)cards.push({l:'In Progress',v:kpis.inProgress,c:O});
  if(kpis.notStarted!==undefined)cards.push({l:'Not Started',v:kpis.notStarted,c:[140,140,140]});
  if(kpis.overdue!==undefined)cards.push({l:'Overdue',v:kpis.overdue,c:R});
  if(kpis.avgProg!==undefined)cards.push({l:'Avg Progress',v:kpis.avgProg+'%',c:[80,80,90]});
  const boxW=(pw-2*ml-(cards.length-1)*gap)/cards.length;
  const boxH=16;
  const sx=centerX(cards.length,boxW);
  const cardY=startY+5;
  let x=sx;
  cards.forEach(c=>{drawCard(c,x,cardY,boxW,boxH);x+=boxW+gap;});
  const sepY=cardY+boxH+3;
  doc.setDrawColor(200,200,205);doc.setLineWidth(0.6);
  doc.line(sx,sepY,sx+cards.length*boxW+(cards.length-1)*gap,sepY);
  doc.setTextColor(0,0,0);doc.setFont('helvetica','normal');
  return sepY+3;
}

    startY=addKpiSection(doc,filtered,startY,d);
    if(startY>doc.internal.pageSize.getHeight()-15){doc.addPage();startY=10;}
    doc.autoTable({
      head:[headers],body:data,startY,
      styles:{fontSize:7,fontStyle:'bold',cellPadding:0.6,overflow:'linebreak',lineColor:[200,200,200],lineWidth:0.05},
      headStyles:{fillColor:[76,93,113],fontSize:7,fontStyle:'bold',halign:'center',valign:'middle',lineColor:[76,93,113],lineWidth:0.15,textColor:255},
      alternateRowStyles:{fillColor:[246,246,246]},
      columnStyles:colStyles,
      margin:{left:ml,right:mr,bottom:8},
      didDrawPage:function(d){
        const pn=doc.internal.getCurrentPageInfo().pageNumber;
        const tp=doc.internal.getNumberOfPages();
        addPDFFooter(doc,pn,tp);
      }
    });
    startY=doc.lastAutoTable.finalY+6;
  }
  try{downloadBlob(doc.output('blob'),fn+'.pdf');}catch(e){console.warn('Blob output failed, using doc.save:',e);doc.save(fn+'.pdf');}
}

// ======================== CONFIG ========================
function showConfig(){
  const redirectUri=location.origin+location.pathname;
  const savedTenant=storage.getItem('dcform-tenant')||'';
  const savedClient=storage.getItem('dcform-client')||'';
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:1100;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML=`<div style="background:var(--white);border-radius:8px;box-shadow:0 8px 30px rgba(0,0,0,.25);width:90vw;max-width:520px;padding:20px;max-height:90vh;overflow-y:auto">
    <h3 style="margin-bottom:16px;font-size:16px">⚙️ Azure AD Configuration</h3>
    <div class="form-group"><label class="required">Tenant ID</label><input type="text" id="cfg-tenant" value="${savedTenant}" placeholder="Your Microsoft Entra ID Tenant ID"></div>
    <div class="form-group"><label class="required">Client ID</label><input type="text" id="cfg-client" value="${savedClient}" placeholder="App Registration Client ID for THIS app"></div>
    <div style="background:var(--yellow-light);border-radius:6px;padding:10px 12px;margin-bottom:12px;font-size:12px;line-height:1.5">
      <strong>📋 Azure AD Setup (popup flow)</strong>
      <ol style="margin:6px 0 0 16px;padding:0">
        <li>Go to <strong>Microsoft Entra ID</strong> → <strong>App registrations</strong> → <strong>New registration</strong></li>
        <li>Name: <code>AlEnshaiah DC Form</code> (or any name)</li>
        <li>Supported account types: <strong>Accounts in this organizational directory only</strong></li>
        <li>Redirect URI: <strong>Single-page application (SPA)</strong> → <code>${redirectUri}</code></li>
        <li>Click <strong>Register</strong>, then copy the <strong>Application (client) ID</strong></li>
        <li>Under <strong>API permissions</strong>, add:<br>
          <code>Sites.ReadWrite.All</code> (Graph, Delegated) ${redirectUri.includes('localhost')?'':'· <code>AllSites.Write</code> (SharePoint, Delegated)'}</li>
        <li>Grant admin consent for your organization</li>
      </ol>
    </div>
    <div class="hint" style="margin-bottom:12px">This app uses a <strong>popup</strong> for login — no page reload. Ensure popups are allowed for this site.</div>
    <button class="btn btn-primary" onclick="saveConfig()" style="width:100%;padding:8px;margin-top:8px">Save &amp; Re-authenticate</button>
    <button class="btn btn-outline" onclick="this.closest('div').parentElement.remove()" style="width:100%;padding:8px;margin-top:8px">Close</button>
  </div>`;
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};
  document.body.appendChild(overlay);
}

function saveConfig(){
  const t=document.getElementById('cfg-tenant').value.trim();
  const c=document.getElementById('cfg-client').value.trim();
  if(t)storage.setItem('dcform-tenant',t);
  if(c)storage.setItem('dcform-client',c);
  showToast('Config saved. Re-authenticating...','success');
  setTimeout(()=>location.reload(),500);
}

// ======================== INIT ========================
(function init(){
  if(storage.getItem('dcform-dark')){document.body.classList.add('dark');document.getElementById('dark-toggle').textContent='☀️';}
  initDeptSelect();
  if(location.protocol==='file:'){
    showSigninError('⚠️ This app cannot run from a local file path. Deploy to GitHub Pages, IIS, or any web server for SSO and SharePoint access.');
    return;
  }
  if(typeof msal==='undefined'){
    showSigninError('⚠️ Microsoft Authentication Library (MSAL) failed to load. Check your internet connection or ad blocker, then reload the page.');
    return;
  }
  if(!initMsal()){ showSigninError('⚠️ Azure AD initialization failed. Click ⚙️ to check Tenant ID and Client ID in Config.'); return; }
  // Check for cached account first (survives page refresh)
  const accounts = msalApp.getAllAccounts();
  if(accounts.length>0){
    spUser = accounts[0];
    msalApp.acquireTokenSilent({ scopes: SP_SCOPES, account: spUser })
      .then(r=>{ spToken=r.accessToken; hideSigninOverlay(); updateAuthUI(); loadUserPerms().then(()=>{ initDeptSelect();           if(!hasAnyFormAccess()){ setEmpty('🔒','Access Denied',ACCESS_DENIED_MSG); document.getElementById('dept-select').disabled=true; }else{ const d=storage.getItem('dcform-last-dept'); if(d)onDeptChange(); } }); })
      .catch(()=>{ spToken=null; showSigninProgress(true); ssoSilentAttempt().then(authed=>{ showSigninProgress(false); if(!authed) updateAuthUI(); }).catch(e=>{ showSigninProgress(false); console.error('[SSO]',e); updateAuthUI(); }); });
  }else{
    showSigninProgress(true);
    ssoSilentAttempt().then(authed=>{
      showSigninProgress(false);
      if(!authed) updateAuthUI();
    }).catch(e=>{
      showSigninProgress(false);
      console.error('[SSO]',e);
      updateAuthUI();
    });
  }
})();
</script>
